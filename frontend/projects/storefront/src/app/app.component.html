<main>
  <header class="site-header">
    <h1>Commerce App Lab — Storefront</h1>
    <nav>
      <a routerLink="/">Products</a>
      @if (isAuthenticated()) {
        <a routerLink="/cart">Cart</a>
        <a routerLink="/orders">Orders</a>
        <a routerLink="/account">{{ currentUser()?.email }}</a>
      } @else {
        <a routerLink="/login">Log in</a>
        <a routerLink="/register">Register</a>
      }
    </nav>
  </header>

  <router-outlet />

  @if (isAuthenticated()) {
    <app-chat-widget />
  }
</main>
