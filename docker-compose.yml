name: commerce-app-lab

# Services are uncommented and added here as their milestone lands (see ROADMAP.md).

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourPassword123' -Q 'SELECT 1' -b -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-api:
    build: ./services/Catalog
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=CatalogDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-api:
    build: ./services/Identity
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=IdentityDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True
      - Jwt__Key=NrQlrM3IEtEuIi0Hjw4P6+5GMAoIIMgGHQNLsd+OjDRiYu39VkUVgOOsvsvYYTJ/
      - Jwt__Issuer=commerce-app-lab-identity
      - Jwt__Audience=commerce-app-lab
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5002:8080"
    depends_on:
      db:
        condition: service_healthy

  # cart-api:           # milestone 3
  # order-api:          # milestone 3
  # gateway:             # milestone 3
  # storefront:          # milestone 1 (run locally via `ng serve` for now)
  # admin:               # milestone 8
  # mcp-server:          # milestone 6
