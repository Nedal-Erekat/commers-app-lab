name: commerce-app-lab

# Services are uncommented and added here as their milestone lands (see ROADMAP.md).

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourPassword123' -Q 'SELECT 1' -b -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-api:
    build: ./services/Catalog
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=CatalogDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=NrQlrM3IEtEuIi0Hjw4P6+5GMAoIIMgGHQNLsd+OjDRiYu39VkUVgOOsvsvYYTJ/
      - Jwt__Issuer=commerce-app-lab-identity
      - Jwt__Audience=commerce-app-lab
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-api:
    build: ./services/Identity
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=IdentityDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True
      - Jwt__Key=NrQlrM3IEtEuIi0Hjw4P6+5GMAoIIMgGHQNLsd+OjDRiYu39VkUVgOOsvsvYYTJ/
      - Jwt__Issuer=commerce-app-lab-identity
      - Jwt__Audience=commerce-app-lab
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5002:8080"
    depends_on:
      db:
        condition: service_healthy

  cart-api:
    build: ./services/Cart
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=CartDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True
      - Jwt__Key=NrQlrM3IEtEuIi0Hjw4P6+5GMAoIIMgGHQNLsd+OjDRiYu39VkUVgOOsvsvYYTJ/
      - Jwt__Issuer=commerce-app-lab-identity
      - Jwt__Audience=commerce-app-lab
      - CatalogApi__BaseUrl=http://catalog-api:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5003:8080"
    depends_on:
      db:
        condition: service_healthy
      catalog-api:
        condition: service_started

  order-api:
    build: ./services/Order
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=OrderDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True
      - Jwt__Key=NrQlrM3IEtEuIi0Hjw4P6+5GMAoIIMgGHQNLsd+OjDRiYu39VkUVgOOsvsvYYTJ/
      - Jwt__Issuer=commerce-app-lab-identity
      - Jwt__Audience=commerce-app-lab
      - CartApi__BaseUrl=http://cart-api:8080
      - ServiceBus__ConnectionString=Endpoint=sb://sb-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - ServiceBus__QueueName=order-placed
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5004:8080"
    depends_on:
      db:
        condition: service_healthy
      cart-api:
        condition: service_started
      sb-emulator:
        condition: service_started

  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123"

  sb-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "YourPassword123"
    volumes:
      - ./infra/servicebus-emulator/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
    depends_on:
      - sqledge

  order-processing-worker:
    build: ./services/OrderProcessing
    environment:
      - ServiceBus__ConnectionString=Endpoint=sb://sb-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - ServiceBus__QueueName=order-placed
      - CatalogApi__BaseUrl=http://catalog-api:8080
      - DOTNET_ENVIRONMENT=Development
    depends_on:
      sb-emulator:
        condition: service_started
      catalog-api:
        condition: service_started

  gateway:
    build: ./services/Gateway
    environment:
      - ReverseProxy__Clusters__catalog-cluster__Destinations__destination1__Address=http://catalog-api:8080
      - ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address=http://identity-api:8080
      - ReverseProxy__Clusters__cart-cluster__Destinations__destination1__Address=http://cart-api:8080
      - ReverseProxy__Clusters__order-cluster__Destinations__destination1__Address=http://order-api:8080
      - ReverseProxy__Clusters__assistant-cluster__Destinations__destination1__Address=http://assistant-api:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - catalog-api
      - identity-api
      - cart-api
      - order-api
      - assistant-api

  mcp-server:
    build: ./services/Mcp
    environment:
      - Gateway__BaseUrl=http://gateway:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5005:8080"
    depends_on:
      - gateway

  assistant-api:
    build: ./services/Assistant
    environment:
      - Jwt__Key=NrQlrM3IEtEuIi0Hjw4P6+5GMAoIIMgGHQNLsd+OjDRiYu39VkUVgOOsvsvYYTJ/
      - Jwt__Issuer=commerce-app-lab-identity
      - Jwt__Audience=commerce-app-lab
      - Mcp__BaseUrl=http://mcp-server:8080
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in your shell or a .env file}
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5006:8080"

  # storefront:          # milestone 1 (run locally via `ng serve` for now)
  # admin:               # milestone 8
