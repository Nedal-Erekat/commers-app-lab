# Documentation only — NOT applied as-is (see infra/bicep/deploy.sh, which builds
# the real Secret from Bicep deployment outputs + your supplied admin password/JWT
# key via `kubectl create secret generic app-secrets --from-literal=...`).
#
# One shared Secret, four connection strings — each Deployment below picks its own
# key via env.valueFrom.secretKeyRef and remaps it to the ConnectionStrings__* env
# var name ASP.NET Core's configuration binder expects.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  CatalogDbConnectionString: "Server=tcp:<sql-server-fqdn>,1433;Database=CatalogDb;User Id=<admin-login>;Password=<admin-password>;Encrypt=True;TrustServerCertificate=False;"
  IdentityDbConnectionString: "Server=tcp:<sql-server-fqdn>,1433;Database=IdentityDb;User Id=<admin-login>;Password=<admin-password>;Encrypt=True;TrustServerCertificate=False;"
  CartDbConnectionString: "Server=tcp:<sql-server-fqdn>,1433;Database=CartDb;User Id=<admin-login>;Password=<admin-password>;Encrypt=True;TrustServerCertificate=False;"
  OrderDbConnectionString: "Server=tcp:<sql-server-fqdn>,1433;Database=OrderDb;User Id=<admin-login>;Password=<admin-password>;Encrypt=True;TrustServerCertificate=False;"
  RedisConnectionString: "<redis-hostname>:6380,password=<redis-primary-key>,ssl=True,abortConnect=False"
  JwtKey: "<a-fresh-32-plus-byte-secret-generated-for-this-deployment>"
  ServiceBusConnectionString: "Endpoint=sb://<servicebus-namespace>.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=<servicebus-primary-key>"
  AnthropicApiKey: "<your Anthropic API key — sk-ant-...>"
