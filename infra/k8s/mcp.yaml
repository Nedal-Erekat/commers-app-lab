apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels: { app: mcp-server }
  template:
    metadata:
      labels: { app: mcp-server }
    spec:
      containers:
        - name: mcp-server
          image: ${ACR_LOGIN_SERVER}/mcp-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: Gateway__BaseUrl
              value: "http://gateway"
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 192Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
# type: LoadBalancer so external MCP clients (Claude Desktop, remote agents) can
# reach it — a second always-on public IP alongside the gateway's. Delete this
# Service between demos if you only need the MCP client running locally against
# a port-forward instead.
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
spec:
  type: LoadBalancer
  selector: { app: mcp-server }
  ports:
    - port: 80
      targetPort: 8080
