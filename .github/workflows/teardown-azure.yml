name: Teardown Azure

# Manual trigger only. Deletes the whole resource group in one shot — see
# infra/bicep/teardown.sh. Requires the same AZURE_CREDENTIALS secret as
# deploy-azure.yml.

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Azure resource group to delete"
        required: true
        default: "commerce-app-lab-rg"

# Shares a concurrency group with deploy-azure.yml — one deploy/teardown at a time per resource
# group. Never cancel-in-progress: don't want a queued teardown to be silently dropped, or a live
# one interrupted mid-delete.
concurrency:
  group: azure-${{ inputs.resource_group }}

permissions:
  contents: read

jobs:
  teardown:
    runs-on: ubuntu-latest
    environment: azure-production
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete resource group
        run: az group delete --name "${{ inputs.resource_group }}" --yes --no-wait
